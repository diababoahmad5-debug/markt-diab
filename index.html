<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الاحترافي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background: #232f3e; color: white; padding: 15px; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .price { color: #b12704; font-weight: bold; font-size: 1.2em; }
        button { background: #f0c14b; border: 1px solid #a88734; padding: 10px; cursor: pointer; width: 100%; border-radius: 5px; }
        button:hover { background: #f7dfa5; }
    </style>
</head>
<body>

<header>
    <h1>متجر أمازون المصغر</h1>
</header>

<div class="container" id="shop">
    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="منتج">
        <h3>جهاز ESP32-CAM</h3>
        <p class="price">15$</p>
        <button>إضافة للسلة</button>
    </div>
    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="منتج">
        <h3>حساس حركة</h3>
        <p class="price">5$</p>
        <button>إضافة للسلة</button>
    </div>
</div>

</body>
</html>
