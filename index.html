<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iControl ESP - واجهة مكثفة وشاملة</title>
    <!-- مكتبات Firebase المتوافقة -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0B1120, #19213C);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            overflow: hidden; /* منع التمرير نهائياً */
        }

        .container {
            width: 100%;
            max-width: 440px;
            height: 96vh; /* استغلال أقصى ارتفاع متاح بدون تمرين */
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* صفحة تسجيل المستخدمين */
        .sessions-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .sessions-title h1 {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #fff, #4facfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .users-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .user-card {
            background: rgba(79, 172, 254, 0.06);
            border: 1px solid rgba(79, 172, 254, 0.15);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .delete-user {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 4px 8px;
            border-radius: 8px;
            color: #ff5555;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .add-user-section {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 10px;
        }

        .add-user-section h4 {
            color: #cbd5e1;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 6px;
        }

        .input-group input, .popup-panel input, .popup-panel select, #panelTimer select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 0.85rem;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-top: 4px;
            font-size: 0.75rem;
        }

        /* صفحات التحكم والتبويبات */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .nav-header h1 {
            font-size: 1.2rem;
            color: #fff;
        }

        .nav-buttons {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .nav-btn.active {
            background: #4facfe;
            border-color: #4facfe;
        }

        .current-user {
            background: rgba(0,0,0,0.25);
            border-radius: 10px;
            padding: 6px;
            margin-bottom: 8px;
            text-align: center;
            color: #cbd5e1;
            font-size: 0.8rem;
        }
        .current-user span { color: #4facfe; font-weight: bold; }

        /* أزرار التحكم الجماعي (تشغيل / إطفاء الكل) */
        .global-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .global-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s;
        }

        .global-btn.all-on {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.2);
        }

        .global-btn.all-off {
            background: linear-gradient(135deg, #c62828, #f44336);
            box-shadow: 0 4px 10px rgba(244, 67, 54, 0.2);
        }

        /* شبكة أزرار التحكم - مضغوطة ومكبرة الأيقونات */
        .relays-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            flex-grow: 1;
        }

        .relay-card {
            background: rgba(10, 20, 35, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 6px 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .relay-name {
            font-size: 0.8rem;
            color: #e2e8f0;
            font-weight: 600;
            text-align: center;
            width: 95%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .toggle-switch {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .toggle-switch.on {
            background: linear-gradient(145deg, #00c853, #00e676);
            box-shadow: 0 0 14px rgba(0, 230, 118, 0.4);
        }

        .toggle-switch.off {
            background: linear-gradient(145deg, #d32f2f, #f44336);
            box-shadow: 0 0 8px rgba(244, 67, 54, 0.2);
        }

        .toggle-switch span { 
            font-size: 1.8rem;
            color: white; 
        }

        .status-text { font-size: 0.7rem; font-weight: bold; margin-top: 2px; }
        .status-text.on { color: #00e676; }
        .status-text.off { color: #f44336; }

        /* تبويب المؤقت الزمني */
        .timer-ui-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            flex-grow: 1;
        }

        .timer-row {
            display: flex;
            gap: 6px;
        }
        .timer-row input {
            width: 50%;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            text-align: center;
            font-size: 1rem;
        }

        .timer-display {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(79, 172, 254, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            color: #4facfe;
            font-family: monospace;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        .active-timer-badge {
            background: rgba(255, 136, 0, 0.12);
            border: 1px solid rgba(255, 136, 0, 0.3);
            color: #ff8800;
            border-radius: 8px;
            padding: 6px;
            font-size: 0.75rem;
            text-align: center;
        }

        .cancel-btn {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff5555;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* شريط سفلي ثابت ومستقل مدمج */
        .fixed-bottom-bar {
            margin-top: auto;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        .fixed-bottom-bar button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 8px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .fixed-bottom-bar button.logout-btn {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.2);
            color: #ff5555;
        }

        /* اللوحة المنبثقة للتسمية */
        .popup-panel {
            position: absolute;
            top: 50px; left: 10px; right: 10px; bottom: 55px;
            background: #0f1a30;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 12px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            display: none;
        }

        .popup-panel.show { display: flex; }
        .popup-scroll { flex-grow: 1; overflow-y: auto; }
        .popup-panel input { margin-bottom: 6px; padding: 8px; }

        .save-btn {
            background: #00e676; border: none; padding: 10px; border-radius: 10px; color: white; font-weight: bold; margin-top: 4px; cursor: pointer;
        }
        .close-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; color: white; margin-top: 4px; cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 75px; left: 50%;
            transform: translateX(-50%);
            background: #4facfe; color: white;
            padding: 6px 16px; border-radius: 50px;
            opacity: 0; transition: opacity 0.2s;
            z-index: 1000; font-size: 0.75rem;
        }

        button:active { transform: scale(0.97); }
        #controlPage { display: none; height: 100%; flex-direction: column; }
    </style>
</head>
<body>

<div class="container">
    <!-- صفحة تسجيل المستخدمين -->
    <div id="sessionsPage" style="height: 100%; display: flex; flex-direction: column;">
        <div class="sessions-title">
            <h1>👥 نظام الدخول</h1>
        </div>
        <div id="usersList" class="users-list"></div>
        
        <div class="add-user-section">
            <h4>➕ إضافة جهاز جديد</h4>
            <div class="input-group"><input type="text" id="newUserName" placeholder="اسم المستخدم"></div>
            <div class="input-group"><input type="text" id="newUserChipId" placeholder="معرف الجهاز السري (Chip ID)"></div>
            <button id="addUserBtn" class="btn-primary">✅ تسجيل الحساب</button>
            <div id="addUserError" class="error-msg"></div>
        </div>
    </div>

    <!-- صفحة التحكم الرئيسية (بدون تمرير) -->
    <div id="controlPage">
        <div class="nav-header">
            <h1>🎮 iControl</h1>
            <div class="nav-buttons">
                <button class="nav-btn active" id="tabControlBtn">تحكم</button>
                <button class="nav-btn" id="tabTimerBtn">المؤقت</button>
                <button class="nav-btn" id="tabChipsBtn">أجهزتي</button>
            </div>
        </div>

        <div class="current-user">المستَخدم: <span id="currentUserName">---</span></div>

        <!-- أزرار التحكم الجماعي لتشغيل وإطفاء الكل بضغطة واحدة -->
        <div id="globalPanel" class="global-controls">
            <button id="allOnBtn" class="global-btn all-on">🟢 تشغيل الكل</button>
            <button id="allOffBtn" class="global-btn all-off">🔴 إطفاء الكل</button>
        </div>

        <!-- الأزرار والمخارج المكبرة والمضغوطة -->
        <div id="panelControl" class="relays-grid"></div>

        <!-- التبويب المنفصل للمؤقت الزمني -->
        <div id="panelTimer" style="display: none;" class="timer-ui-box">
            <div id="activeTimerBadge" class="active-timer-badge" style="display: none;"></div>
            <label style="color:#cbd5e1; font-size:0.8rem;">اختر المخرج لجدولته:</label>
            <select id="scheduleRelaySelect">
                <option value="1">مخرج 1</option><option value="2">مخرج 2</option><option value="3">مخرج 3</option>
                <option value="4">مخرج 4</option><option value="5">مخرج 5</option><option value="6">مخرج 6</option>
                <option value="7">مخرج 7</option>
            </select>
            <div class="timer-row">
                <input type="number" id="timerMinutes" placeholder="دقائق" value="0" min="0">
                <input type="number" id="timerSeconds" placeholder="ثواني" value="5" min="0" max="59">
            </div>
            <div id="countdownDisplay" class="timer-display">⏰ اضغط هنا لبدء العد</div>
            <button id="cancelTimerBtn" class="cancel-btn">❌ إلغاء المؤقت الحالي</button>
        </div>

        <!-- تبويب الأجهزة الأخرى -->
        <div id="panelChips" style="display: none; flex-grow: 1; overflow-y: auto;">
            <div id="chipsList"></div>
        </div>

        <!-- الشريط السفلي الثابت للعمليات السريعة -->
        <div class="fixed-bottom-bar">
            <button id="customizeBtn">🎨 التسمية</button>
            <button id="logoutBtn" class="logout-btn">🚪 خروج</button>
        </div>

        <!-- نافذة التسمية المنبثقة المدمجة -->
        <div id="customizePanel" class="popup-panel">
            <div style="color:white; font-size:0.85rem; margin-bottom:6px;">🎨 تعديل مسميات المخارج:</div>
            <div id="customizeInputs" class="popup-scroll"></div>
            <button id="saveCustomize" class="save-btn">💾 حفظ والتحديث</button>
            <button class="close-btn" id="closeCustomizeBtn">إلغاء</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const firebaseConfig = { databaseURL: "https://esp-e2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null, currentChipId = null, users = [];
    let relaysState = {1: false, 2: false, 3: false, 4: false, 5: false, 6: false, 7: false};
    let relayNames = {1: "مخرج 1", 2: "مخرج 2", 3: "مخرج 3", 4: "مخرج 4", 5: "مخرج 5", 6: "مخرج 6", 7: "مخرج 7"};
    let relayListeners = [], timerEndTime = null, timerInterval = null, activeRelayForTimer = null, timerListener = null;
    let authListener = null; // مستمع الأمان المضاف حديثاً لحماية الجهاز

    function showToast(msg) {
        let toast = document.getElementById('toast');
        toast.innerText = msg; toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    // ========== مراقبة الأمان: الطرد عند حذف المعرف من الفايربيس ==========
    function startAuthCheck(chipId) {
        if (authListener) { db.ref(`${currentChipId}/diab`).off('value', authListener); authListener = null; }
        
        authListener = db.ref(`${chipId}/diab`).on('value', (snapshot) => {
            // إذا أصبح غير موجود أو قيمته ليست true فهذا يعني أنه تم حذفه من لوحة التحكم
            if (!snapshot.exists() || snapshot.val() !== true) {
                alert("⚠️ تم إلغاء تفعيل هذا الجهاز أو حذفه من السيرفر! سيتم تسجيل الخروج فوراً.");
                logout();
            }
        });
    }

    // ========== التحكم الجماعي (تشغيل / إطفاء الكل) ==========
    function setAllRelays(state) {
        if (!currentChipId) return;
        let value = state ? "on" : "off";
        let batchUpdates = {};
        
        for (let i = 1; i <= 7; i++) {
            relaysState[i] = state;
            batchUpdates[`/devices/relay${i}`] = value;
        }
        
        db.ref(currentChipId).update(batchUpdates).then(() => {
            renderRelays();
            showToast(state ? "🟢 تم تشغيل جميع السويتشات" : "🔴 تم إطفاء جميع السويتشات");
        });
    }

    // ========== المؤقت لتغيير حالة السويتش تلقائياً ==========
    function loadTimerFromFirebase(chipId) {
        if (timerListener) { db.ref(`${currentChipId}/timer`).off('value', timerListener); timerListener = null; }
        let timerRef = db.ref(`${chipId}/timer`);
        
        timerListener = timerRef.on('value', (snapshot) => {
            let data = snapshot.val();
            if (data && data.endTime && data.relay) {
                let now = Date.now();
                if (data.endTime > now) {
                    timerEndTime = data.endTime; 
                    activeRelayForTimer = data.relay;
                    startTimerDisplay();
                } else if (!data.completed) {
                    timerRef.update({ completed: true });
                    triggerTimerToggle(data.relay);
                } else { clearTimerDisplay(); }
            } else { clearTimerDisplay(); }
        });
    }

    function triggerTimerToggle(relayNum) {
        if (!currentChipId) return;
        db.ref(`${currentChipId}/devices/relay${relayNum}`).once('value').then(snapshot => {
            let currentVal = snapshot.val();
            let nextState = (currentVal === "on") ? "off" : "on";
            db.ref(`${currentChipId}/devices/relay${relayNum}`).set(nextState).then(() => {
                showToast(`⏱️ انتهى المؤقت وتم تغيير حالة ${relayNames[relayNum]}`);
                clearTimerDisplay();
            });
        });
    }

    function startTimerAndSave(minutes, seconds, relayNum) {
        if (!currentChipId) return;
        let totalMs = (minutes * 60 + seconds) * 1000;
        let endTime = Date.now() + totalMs;
        db.ref(`${currentChipId}/timer`).set({
            endTime: endTime, relay: relayNum, startedAt: Date.now(), duration: totalMs, completed: false
        }).then(() => {
            showToast(`⏱️ تم ضبط مؤقت لـ ${relayNames[relayNum]}`);
        });
    }

    function cancelTimer() {
        if (!currentChipId) return;
        db.ref(`${currentChipId}/timer`).remove().then(() => { showToast("❌ تم إلغاء المؤقت"); clearTimerDisplay(); });
    }

    function updateCountdownDisplay() {
        if (!timerEndTime) {
            document.getElementById('countdownDisplay').innerHTML = '⏰ اضغط هنا لبدء العد'; return;
        }
        let remaining = Math.max(0, timerEndTime - Date.now());
        if (remaining <= 0) {
            document.getElementById('countdownDisplay').inne
